<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PeliScraper - Web Scraper para la.movie</title>
    <meta
      name="description"
      content="Herramienta de web scraping para extraer películas, series y animes de la.movie"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M7 4v16M17 4v16M3 8h4M17 8h4M3 12h18M3 16h4M17 16h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"
            />
          </svg>
          PeliScraper
        </div>
        <nav class="nav" id="mainNav">
          <button class="nav-btn active" data-page="dashboard">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="9" />
              <rect x="14" y="3" width="7" height="5" />
              <rect x="14" y="12" width="7" height="9" />
              <rect x="3" y="16" width="7" height="5" />
            </svg>
            Dashboard
          </button>
          <button class="nav-btn" data-page="movies">
            🎬 Películas <span class="badge" id="moviesCount">0</span>
          </button>
          <button class="nav-btn" data-page="series">
            📺 Series <span class="badge" id="seriesCount">0</span>
          </button>
          <button class="nav-btn" data-page="animes">
            🎌 Animes <span class="badge" id="animesCount">0</span>
          </button>
        </nav>
      </header>

      <main class="main">
        <!-- ═══ DASHBOARD ═══ -->
        <div class="page active" id="page-dashboard">
          <!-- Estadísticas -->
          <div class="stats-grid" id="statsGrid">
            <div class="stat-card movies">
              <div class="stat-label">Películas</div>
              <div class="stat-value" id="statMovies">0</div>
            </div>
            <div class="stat-card series">
              <div class="stat-label">Series</div>
              <div class="stat-value" id="statSeries">0</div>
            </div>
            <div class="stat-card animes">
              <div class="stat-label">Animes</div>
              <div class="stat-value" id="statAnimes">0</div>
            </div>
            <div class="stat-card downloads">
              <div class="stat-label">Descargas</div>
              <div class="stat-value" id="statDownloads">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Episodios</div>
              <div class="stat-value" id="statEpisodes">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Con Descargas</div>
              <div class="stat-value" id="statWithDl">0</div>
            </div>
          </div>

          <!-- Panel de Scraping -->
          <div class="scrape-panel">
            <div class="panel-title">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="23 4 23 10 17 10" />
                <polyline points="1 20 1 14 7 14" />
                <path
                  d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"
                />
              </svg>
              Control de Scraping
            </div>

            <div class="scrape-controls">
              <div class="scrape-group">
                <label>Tipo de contenido</label>
                <select id="scrapeType">
                  <option value="movies">🎬 Películas</option>
                  <option value="tvshows">📺 Series</option>
                  <option value="animes">🎌 Animes</option>
                  <option value="downloads">📥 Descargas (todos)</option>
                  <option value="episodes">📋 Episodios</option>
                </select>
              </div>
              <div class="scrape-group" id="pageControls">
                <label>Página inicio</label>
                <input
                  type="number"
                  id="startPage"
                  value="1"
                  min="1"
                  style="width: 100px"
                />
              </div>
              <div class="scrape-group" id="endPageControls">
                <label>Página fin (vacío = todas)</label>
                <input
                  type="number"
                  id="endPage"
                  min="1"
                  style="width: 100px"
                  placeholder="Todas"
                />
              </div>
              <div class="scrape-group" style="justify-content: flex-end">
                <label>&nbsp;</label>
                <div style="display: flex; gap: 8px">
                  <button
                    class="btn btn-primary"
                    id="btnStartScrape"
                    onclick="startScrape()"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="currentColor"
                    >
                      <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                    Iniciar Scraping
                  </button>
                  <button
                    class="btn btn-danger"
                    id="btnStopScrape"
                    onclick="stopScrape()"
                    style="display: none"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="currentColor"
                    >
                      <rect x="6" y="6" width="12" height="12" />
                    </svg>
                    Detener
                  </button>
                </div>
              </div>
            </div>

            <!-- Barra de progreso -->
            <div class="progress-container" id="progressContainer">
              <div class="progress-info">
                <span id="progressLabel">Scrapeando...</span>
                <span id="progressPercent">0%</span>
              </div>
              <div class="progress-bar-wrapper">
                <div class="progress-bar" id="progressBar"></div>
              </div>
              <div class="progress-stats">
                <span
                  ><span class="dot blue"></span> Página:
                  <strong id="progressPage">0/0</strong></span
                >
                <span
                  ><span class="dot green"></span> Items:
                  <strong id="progressItems">0</strong></span
                >
                <span
                  ><span class="dot red"></span> Errores:
                  <strong id="progressErrors">0</strong></span
                >
              </div>
            </div>
          </div>

          <!-- Exportación -->
          <div class="export-section">
            <div class="panel-title">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Exportar Datos
            </div>
            <div class="export-buttons">
              <button
                class="btn btn-outline"
                onclick="exportData('json', 'all')"
              >
                📄 JSON (Todo)
              </button>
              <button
                class="btn btn-outline"
                onclick="exportData('csv', 'all')"
              >
                📊 CSV (Todo)
              </button>
              <button
                class="btn btn-outline"
                onclick="exportData('json', 'movies')"
              >
                🎬 JSON Películas
              </button>
              <button
                class="btn btn-outline"
                onclick="exportData('json', 'tvshows')"
              >
                📺 JSON Series
              </button>
              <button
                class="btn btn-outline"
                onclick="exportData('json', 'animes')"
              >
                🎌 JSON Animes
              </button>
            </div>
          </div>

          <!-- Historial de Jobs -->
          <div class="scrape-panel" style="margin-top: 16px">
            <div class="panel-title">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              Historial de Scraping
            </div>
            <table class="jobs-table" id="jobsTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Tipo</th>
                  <th>Estado</th>
                  <th>Progreso</th>
                  <th>Items</th>
                  <th>Errores</th>
                  <th>Iniciado</th>
                </tr>
              </thead>
              <tbody id="jobsBody"></tbody>
            </table>
          </div>

          <!-- Botón limpiar BD -->
          <div style="margin-top: 16px; text-align: right">
            <button
              class="btn btn-outline btn-sm"
              onclick="clearDatabase()"
              style="color: var(--danger)"
            >
              🗑️ Limpiar Base de Datos
            </button>
          </div>
        </div>

        <!-- ═══ PELÍCULAS ═══ -->
        <div class="page" id="page-movies">
          <div class="content-toolbar">
            <div class="search-box">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                placeholder="Buscar películas..."
                id="searchMovies"
                oninput="debounceSearch('movies')"
              />
            </div>
            <select
              class="filter-select"
              id="genreFilterMovies"
              onchange="loadContent('movies')"
            >
              <option value="">Todos los géneros</option>
            </select>
            <select
              class="filter-select"
              id="yearFilterMovies"
              onchange="loadContent('movies')"
            >
              <option value="">Todos los años</option>
            </select>
            <select
              class="filter-select"
              id="sortMovies"
              onchange="loadContent('movies')"
            >
              <option value="scraped_at">Más reciente</option>
              <option value="title">Título A-Z</option>
              <option value="rating">Rating ↓</option>
              <option value="year">Año ↓</option>
            </select>
          </div>
          <div class="content-grid" id="gridMovies"></div>
          <div class="loader" id="loaderMovies">
            <div class="spinner"></div>
            Cargando...
          </div>
          <div class="pagination" id="paginationMovies"></div>
        </div>

        <!-- ═══ SERIES ═══ -->
        <div class="page" id="page-series">
          <div class="content-toolbar">
            <div class="search-box">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                placeholder="Buscar series..."
                id="searchSeries"
                oninput="debounceSearch('tvshows')"
              />
            </div>
            <select
              class="filter-select"
              id="genreFilterSeries"
              onchange="loadContent('tvshows')"
            >
              <option value="">Todos los géneros</option>
            </select>
            <select
              class="filter-select"
              id="yearFilterSeries"
              onchange="loadContent('tvshows')"
            >
              <option value="">Todos los años</option>
            </select>
            <select
              class="filter-select"
              id="sortSeries"
              onchange="loadContent('tvshows')"
            >
              <option value="scraped_at">Más reciente</option>
              <option value="title">Título A-Z</option>
              <option value="rating">Rating ↓</option>
              <option value="year">Año ↓</option>
            </select>
          </div>
          <div class="content-grid" id="gridSeries"></div>
          <div class="loader" id="loaderSeries">
            <div class="spinner"></div>
            Cargando...
          </div>
          <div class="pagination" id="paginationSeries"></div>
        </div>

        <!-- ═══ ANIMES ═══ -->
        <div class="page" id="page-animes">
          <div class="content-toolbar">
            <div class="search-box">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                placeholder="Buscar animes..."
                id="searchAnimes"
                oninput="debounceSearch('animes')"
              />
            </div>
            <select
              class="filter-select"
              id="genreFilterAnimes"
              onchange="loadContent('animes')"
            >
              <option value="">Todos los géneros</option>
            </select>
            <select
              class="filter-select"
              id="yearFilterAnimes"
              onchange="loadContent('animes')"
            >
              <option value="">Todos los años</option>
            </select>
            <select
              class="filter-select"
              id="sortAnimes"
              onchange="loadContent('animes')"
            >
              <option value="scraped_at">Más reciente</option>
              <option value="title">Título A-Z</option>
              <option value="rating">Rating ↓</option>
              <option value="year">Año ↓</option>
            </select>
          </div>
          <div class="content-grid" id="gridAnimes"></div>
          <div class="loader" id="loaderAnimes">
            <div class="spinner"></div>
            Cargando...
          </div>
          <div class="pagination" id="paginationAnimes"></div>
        </div>
      </main>

      <!-- Modal de Detalle -->
      <div class="modal-overlay" id="detailModal">
        <div class="modal">
          <div class="modal-header">
            <div id="modalBackdropContainer"></div>
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-hero" id="modalHero"></div>
          </div>
          <div class="modal-body" id="modalBody"></div>
        </div>
      </div>

      <!-- Toast Container -->
      <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
